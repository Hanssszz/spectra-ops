services:
  - type: web
    name: spectra-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: spectra-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: spectra-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: spectra-redis
          property: port
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: spectra-db
    plan: free

redis:
  - name: spectra-redis
    plan: free
    ipAllowList: []
