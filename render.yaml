services:
  - type: web
    name: spectra-api
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spectra-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: spectra-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: spectra-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL_RECIPIENTS
        sync: false

  - type: keyvalue
    name: spectra-redis
    plan: free
    ipAllowList: []

databases:
  - name: spectra-db
    plan: free
